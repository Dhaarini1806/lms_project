<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course - Tradersfy Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%); color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: linear-gradient(180deg, #1e1e2e 0%, #16213e 100%); border-right: 1px solid rgba(255, 193, 7, 0.1); }
        .sidebar-item { color: #b0b0b0; padding: 12px 20px; margin: 8px 12px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 193, 7, 0.15); color: #ffc107; border-left: 3px solid #ffc107; }
        .nav-top { background: rgba(30, 30, 46, 0.9); border-bottom: 1px solid rgba(255, 193, 7, 0.1); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-primary { background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%); color: #000; padding: 10px 20px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 193, 7, 0.3); }
        .form-container { background: rgba(30, 30, 46, 0.8); border: 1px solid rgba(255, 193, 7, 0.1); border-radius: 12px; padding: 30px; max-width: 800px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }
        .form-input, .form-select, .form-textarea { width: 100%; background: rgba(255, 193, 7, 0.05); border: 1px solid rgba(255, 193, 7, 0.2); border-radius: 8px; padding: 12px 15px; color: #e0e0e0; font-size: 14px; transition: all 0.3s; font-family: inherit; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #ffc107; background: rgba(255, 193, 7, 0.1); }
        .form-textarea { resize: vertical; min-height: 100px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; color: #ffc107; }
    </style>
</head>
<body>
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="sidebar w-64 h-screen overflow-y-auto">
            <div class="p-6 border-b border-amber-500/20">
                <div class="logo"><i class="fas fa-chart-line text-amber-400 mr-2"></i>Traders<span class="text-gray-400">fy</span></div>
                <p class="text-xs text-gray-500 mt-2">Admin Panel</p>
            </div>
            <nav class="mt-6">
                <a href="{% url 'admin_dashboard' %}" class="sidebar-item"><i class="fas fa-home mr-3"></i>Dashboard</a>
                <a href="{% url 'admin_courses' %}" class="sidebar-item active"><i class="fas fa-book mr-3"></i>Courses</a>
                <a href="{% url 'admin_users' %}" class="sidebar-item"><i class="fas fa-users mr-3"></i>Users</a>
                <a href="{% url 'admin_transactions' %}" class="sidebar-item"><i class="fas fa-credit-card mr-3"></i>Transactions</a>
                <a href="{% url 'admin_analytics' %}" class="sidebar-item"><i class="fas fa-chart-bar mr-3"></i>Analytics</a>
                <hr class="my-4 border-amber-500/10">
                <a href="{% url 'home' %}" class="sidebar-item"><i class="fas fa-arrow-left mr-3"></i>Back to Site</a>
                <a href="{% url 'logout' %}" class="sidebar-item"><i class="fas fa-sign-out-alt mr-3"></i>Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Nav -->
            <div class="nav-top">
                <h1 class="text-2xl font-bold">Edit Course</h1>
            </div>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-8">
                <div class="form-container">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="form-group">
                            <label class="form-label">Course Title</label>
                            <input type="text" name="title" class="form-input" value="{{ course.title }}" required>
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div class="form-group">
                                <label class="form-label">Language</label>
                                <select name="language" class="form-select" required>
                                    <option value="English" {% if course.language == 'English' %}selected{% endif %}>English</option>
                                    <option value="Hindi" {% if course.language == 'Hindi' %}selected{% endif %}>Hindi</option>
                                    <option value="Spanish" {% if course.language == 'Spanish' %}selected{% endif %}>Spanish</option>
                                    <option value="French" {% if course.language == 'French' %}selected{% endif %}>French</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Level</label>
                                <select name="level" class="form-select" required>
                                    <option value="Beginner" {% if course.level == 'Beginner' %}selected{% endif %}>Beginner</option>
                                    <option value="Intermediate" {% if course.level == 'Intermediate' %}selected{% endif %}>Intermediate</option>
                                    <option value="Advanced" {% if course.level == 'Advanced' %}selected{% endif %}>Advanced</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Price (₹)</label>
                            <input type="number" name="price" class="form-input" value="{{ course.price }}" step="0.01" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-textarea" required>{{ course.description }}</textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Author Name</label>
                            <input type="text" name="author_name" class="form-input" value="{{ course.author_name }}" required>
                        </div>

                        <div class="form-group">
                            <label class="checkbox-group">
                                <input type="checkbox" name="is_published" {% if course.is_published %}checked{% endif %}>
                                <span>Publish this course</span>
                            </label>
                        </div>

                        <div class="flex gap-4">
                            <button type="submit" class="btn-primary flex-1"><i class="fas fa-save mr-2"></i>Save Changes</button>
                            <a href="{% url 'admin_courses' %}" class="btn-primary flex-1" style="background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.3); text-align: center; text-decoration: none;"><i class="fas fa-times mr-2"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
