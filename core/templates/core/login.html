<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to your Tradersfy Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0c10] text-white flex items-center justify-center min-h-screen font-sans selection:bg-[#00AEEF] selection:text-black">

    {% csrf_token %}

    <div class="w-full max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
        
        <div class="space-y-4 hidden md:block">
            <h1 class="text-5xl font-extrabold tracking-tight text-white leading-tight">
                Log in to your <span class="text-white">Tradersfy</span> Account
            </h1>
            <p class="text-gray-400 text-lg max-w-md">
                Access your trading academy dashboard instantly via secure passwordless verification.
            </p>
            <div class="flex items-end gap-3 pt-8 h-48 opacity-20">
                <div class="w-16 h-24 border border-gray-500 rounded-sm"></div>
                <div class="w-16 h-44 border border-gray-500 rounded-sm"></div>
                <div class="w-16 h-36 border border-gray-500 rounded-sm"></div>
            </div>
        </div>

        <div class="flex justify-center md:justify-end">
            <div class="w-full max-w-md p-8 bg-[#14161d] rounded-2xl border border-gray-800/60 shadow-2xl">
                <div class="mb-6">
                    <h2 class="text-3xl font-bold text-white">Log in</h2>
                    <p class="text-sm text-gray-400 mt-1">Passwordless Verification</p>
                </div>

                <div id="errorMessageBanner" class="hidden mb-5 p-3 rounded-xl bg-[#2c1616] border border-[#522323] text-[#fca5a5] text-sm text-center">
                    <span id="errorText">Network error while sending OTP.</span>
                </div>

                <div id="stateMobile" class="space-y-5">
                    <div class="flex gap-3">
                        <div class="relative">
                            <select id="countryCode" class="appearance-none block w-24 h-14 rounded-xl border border-gray-700 bg-[#1c1e24] px-4 text-white text-sm font-medium focus:outline-none focus:border-[#00AEEF] focus:ring-1 focus:ring-[#00AEEF] transition duration-150 cursor-pointer">
                                <option value="+91" selected>IN +91</option>
                                <option value="+1">US +1</option>
                                <option value="+44">UK +44</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-400">
                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                            </div>
                        </div>
                        
                        <div class="relative flex-1">
                            <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            </span>
                            <input type="tel" id="mobileNumber" placeholder="**********" 
                                   class="block w-full h-14 pl-12 pr-4 rounded-xl border border-transparent bg-[#eef3f8] text-slate-900 font-medium placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-[#00AEEF] transition duration-150"
                                   maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                    </div>

                    <button type="button" onclick="sendOtpRequest()" 
                            class="w-full h-14 bg-[#00AEEF] hover:bg-[#009bd4] active:scale-[0.99] text-slate-900 font-bold text-base rounded-xl transition duration-150 tracking-wide shadow-lg shadow-[#00AEEF]/10">
                        Send OTP via Mobile
                    </button>
                </div>

                <div id="stateOtp" class="space-y-5 hidden">
                    <div class="space-y-2">
                        <input type="text" id="otpCode" placeholder="••••••" 
                               class="block w-full h-14 tracking-[0.75em] text-center text-2xl font-bold rounded-xl border border-gray-700 bg-[#1c1e24] text-white placeholder-gray-600 focus:outline-none focus:border-[#00AEEF] focus:ring-1 focus:ring-[#00AEEF] transition duration-150"
                               maxlength="6" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <p class="text-xs text-gray-500 text-center">Development Sandbox Token fallback: <span class="text-gray-300 font-mono font-bold">123456</span></p>
                    </div>

                    <div class="space-y-3">
                        <button type="button" onclick="verifyOtpRequest()" 
                                class="w-full h-14 bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold text-base rounded-xl transition duration-150 tracking-wide shadow-lg">
                            Verify & Proceed
                        </button>
                        
                        <button type="button" onclick="goBackToMobile()" 
                                class="w-full text-center text-sm font-semibold text-gray-400 hover:text-white transition duration-150 py-1">
                            Modify Phone Number
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function showAlert(message) {
            const banner = document.getElementById('errorMessageBanner');
            const txt = document.getElementById('errorText');
            txt.textContent = message;
            banner.classList.remove('hidden');
        }

        function hideAlert() {
            document.getElementById('errorMessageBanner').classList.add('hidden');
        }

        function goBackToMobile() {
            hideAlert();
            document.getElementById('stateOtp').classList.add('hidden');
            document.getElementById('stateMobile').classList.remove('hidden');
        }

        function sendOtpRequest() {
            hideAlert();
            const mobileInput = document.getElementById('mobileNumber').value.trim();
            if (!mobileInput || mobileInput.length < 10) {
                showAlert('Please match requested format: A valid 10-digit number.');
                return;
            }

            const fullMobile = document.getElementById('countryCode').value + mobileInput;
            
            fetch('/api/auth/send-otp/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ phone: fullMobile })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('stateMobile').classList.add('hidden');
                    document.getElementById('stateOtp').classList.remove('hidden');
                } else {
                    showAlert(data.error || 'Failed to dispatch secure OTP verification token.');
                }
            })
            .catch(err => {
                console.error(err);
                showAlert('Network error while sending OTP.');
            });
        }

        function verifyOtpRequest() {
            hideAlert();
            const otp = document.getElementById('otpCode').value.trim();
            const mobileInput = document.getElementById('mobileNumber').value.trim();
            const fullMobile = document.getElementById('countryCode').value + mobileInput;

            if (otp.length !== 6) {
                showAlert('Verification failure: OTP must contain exactly 6 digits.');
                return;
            }

            fetch('/api/auth/verify-otp/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ otp: otp, phone: fullMobile })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect_url;
                } else {
                    showAlert(data.error || "The secure context rejected the provided key.");
                }
            })
            .catch(err => {
                console.error(err);
                showAlert('Network verification communication breakdown.');
            });
        }
    </script>
</body>
</html>
