<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Complete - Tradersfy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full rounded-3xl p-8 text-center space-y-6"
         style="background:#ffffff; border:1px solid #e2e8f0; box-shadow:0 8px 32px rgba(15,23,42,.08);">

        <!-- ── Success Icon ── -->
        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto text-2xl"
             style="background:rgba(5,150,105,0.08); border:1px solid rgba(5,150,105,0.2); color:#059669;">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <div class="space-y-1">
            <h2 class="text-xl font-bold tracking-tight" style="color:#1e293b;">Payment Complete!</h2>
            <p class="text-xs" style="color:#94a3b8;">Your trading training track has been officially unlocked.</p>
        </div>

        <!-- ── Order Receipt ── -->
        <div class="p-4 rounded-2xl text-left text-xs space-y-2.5"
             style="background:#f8fafc; border:1px solid #e2e8f0;">
            <div class="flex justify-between" style="color:#64748b;">
                <span>Invoice Reference:</span>
                <span class="font-mono font-bold" style="color:#1e293b;">{{ order.order_id }}</span>
            </div>
            <div class="flex justify-between" style="color:#64748b;">
                <span>Payment Channel:</span>
                <span style="color:#1e293b;">{{ order.payment_method }}</span>
            </div>
            <div class="flex justify-between" style="color:#64748b;">
                <span>Tax Rate Applied:</span>
                <span style="color:#1e293b;">18% Integrated GST</span>
            </div>
            <div class="flex justify-between font-bold pt-2.5" style="border-top:1px solid #e2e8f0;">
                <span style="color:#1e293b;">Amount Settled:</span>
                <span style="color:#00AEEF;">₹{{ order.total }}</span>
            </div>
        </div>

        <!-- ── CTA ── -->
        <div class="pt-1">
            <a href="{% url 'course_catalog' %}"
               class="block w-full font-medium text-xs py-3 rounded-xl transition"
               style="background:#f1f5f9; border:1px solid #e2e8f0; color:#64748b;"
               onmouseover="this.style.background='#e2e8f0'; this.style.color='#1e293b';"
               onmouseout="this.style.background='#f1f5f9'; this.style.color='#64748b';">
                Go to Course Catalog
            </a>
        </div>
    </div>

</body>
</html>
