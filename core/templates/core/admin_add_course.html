<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Course | Tradersfy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0A0A] text-white min-h-screen font-sans">

    <div class="max-w-3xl mx-auto p-6 py-12">
        
        <div class="mb-6">
            <a href="{% url 'admin_dashboard' %}" class="text-xs text-zinc-500 hover:text-amber-500 transition">← Back to Dashboard</a>
            <h1 class="text-3xl font-bold mt-2">Publish a Course</h1>
        </div>

        <form action="{% url 'admin_add_course' %}" method="POST" enctype="multipart/form-data" class="bg-[#161616] border border-zinc-800 rounded-xl p-8 space-y-6 shadow-xl">
            {% csrf_token %}

            <div class="flex flex-col space-y-2">
                <label for="title" class="text-sm font-medium text-zinc-300">Course Title</label>
                <input type="text" name="title" id="title" required placeholder="e.g., Advanced Options Trading Mastery" 
                       class="w-full bg-[#1e1e1e] border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white transition">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="flex flex-col space-y-2">
                    <label for="language" class="text-sm font-medium text-zinc-300">Language</label>
                    <select name="language" id="language" class="w-full bg-[#1e1e1e] border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white transition">
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Tamil">Tamil</option>
                    </select>
                </div>

                <div class="flex flex-col space-y-2">
                    <label for="level" class="text-sm font-medium text-zinc-300">Target Skill Level</label>
                    <select name="level" id="level" class="w-full bg-[#1e1e1e] border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white transition">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>

                <div class="flex flex-col space-y-2">
                    <label for="price" class="text-sm font-medium text-zinc-300">Price (INR)</label>
                    <input type="number" name="price" id="price" required placeholder="4999" min="0"
                           class="w-full bg-[#1e1e1e] border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white transition">
                </div>
            </div>

            <div class="flex flex-col space-y-2">
                <label for="description" class="text-sm font-medium text-zinc-300">Course Syllabus & Description</label>
                <textarea name="description" id="description" rows="4" placeholder="Outline exactly what lessons, skills, and strategies your platform students will unlock inside this module..." 
                          class="w-full bg-[#1e1e1e] border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white transition resize-none"></textarea>
            </div>

            <div class="flex flex-col space-y-2">
                <label class="text-sm font-medium text-zinc-300">Upload Media Asset (Thumbnail/Preview File)</label>
                
                <div id="dropzone" class="border-2 border-dashed border-zinc-800 hover:border-amber-500/50 bg-[#1e1e1e] rounded-xl p-8 text-center cursor-pointer transition flex flex-col items-center justify-center space-y-2 group">
                    <svg class="w-8 h-8 text-zinc-500 group-hover:text-amber-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p id="dropzone-text" class="text-xs text-zinc-400 group-hover:text-zinc-200 transition">Drag & drop your course file target box, or <span class="text-amber-500 font-medium decoration-1 underline">browse storage</span></p>
                    
                    <input type="file" name="thumbnail" id="file-input" class="hidden" accept="image/*,video/*">
                </div>
            </div>

            <div class="pt-4 flex justify-end gap-4">
                <a href="{% url 'admin_dashboard' %}" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-sm font-medium px-6 py-2.5 rounded-lg transition">Cancel</a>
                <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-black text-sm font-semibold px-8 py-2.5 rounded-lg shadow-lg shadow-amber-500/10 transition">Publish Blueprint</button>
            </div>
        </form>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-input');
        const dropzoneText = document.getElementById('dropzone-text');

        // Clicking the container opens native explorer file prompt 
        dropzone.addEventListener('click', () => fileInput.click());

        // File selection handle confirmation 
        fileInput.addEventListener('change', (e) => {
            if(fileInput.files.length) updateFeedback(fileInput.files[0].name);
        });

        // Drag Events Control Mechanics
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.add('border-amber-500', 'bg-zinc-800/40');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.remove('border-amber-500', 'bg-zinc-800/40');
            }, false);
        });

        // Drop Event execution extraction file map binding
        dropzone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if(files.length) {
                fileInput.files = files; // Maps the dropped file objects over to the form input field
                updateFeedback(files[0].name);
            }
        });

        function updateFeedback(fileName) {
            dropzoneText.innerHTML = `Selected File: <strong class="text-amber-500">${fileName}</strong>`;
        }
    </script>
</body>
</html>
